<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Society Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  text-align: center;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  background: #eee;
  cursor: pointer;
  border-radius: 8px;
  margin-right: 5px;
  margin-bottom: 5px;
}

.tab.active {
  background: #4facfe;
  color: white;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  background: #4facfe;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #007bff;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.button-group {
  display: flex;
  gap: 10px;
}

.button-group button {
  flex: 1;
}
</style>
</head>

<body>

<div class="container">
<h2>Society Management</h2>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="openTab(event,'individual')">Individual Entry</div>
  <div class="tab" onclick="openTab(event,'bulk')">Bulk Entry</div>
  <div class="tab" onclick="openTab(event,'expenses')">Expenses</div>
  <div class="tab" onclick="openTab(event,'reports')">Reports</div>
</div>

<!-- Individual Entry -->
<div id="individual" class="tab-content active">
  <h3>Individual Entry</h3>

  <input id="name" placeholder="Name">
  <input id="flat" placeholder="Flat No">

  <div class="row">
    <input id="sinking" type="number" placeholder="Sinking Fund">
    <input id="repairs" type="number" placeholder="Repairs & Maintenance">
    <input id="tax" type="number" placeholder="Municipal Tax">
    <input id="water" type="number" placeholder="Water Charges">
    <input id="electricity" type="number" placeholder="Electricity Charges">
    <input id="parking" type="number" placeholder="Parking Charges">
    <input id="insurance" type="number" placeholder="Insurance">
    <input id="service" type="number" placeholder="Service Charges">
    <input id="interest" type="number" placeholder="Interest on Default">
    <input id="nonoccupancy" type="number" placeholder="Non-Occupancy Charges">
    <input id="training" type="number" placeholder="Training Fees">
  </div>

  <button onclick="submitForm()">Submit</button>
</div>

<!-- Bulk Entry -->
<div id="bulk" class="tab-content">
  <h3>Bulk Upload (Excel)</h3>

  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none">

  <div class="button-group">
    <button onclick="document.getElementById('fileInput').click()">Browse</button>
    <button onclick="submitFile()">Submit</button>
  </div>

  <p id="fileName">No file selected</p>
</div>

<!-- Expenses -->
<div id="expenses" class="tab-content">
  <h3>Expenses</h3>
  <p>Expenses module coming soon...</p>
</div>

<!-- Reports -->
<div id="reports" class="tab-content">
  <h3>Reports</h3>
  <p>Reports module coming soon...</p>
</div>

</div>

<script>
function openTab(evt, tabName) {
  let tabs = document.getElementsByClassName("tab");
  let contents = document.getElementsByClassName("tab-content");

  for (let i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove("active");
  }

  for (let i = 0; i < contents.length; i++) {
    contents[i].classList.remove("active");
  }

  evt.target.classList.add("active");
  document.getElementById(tabName).classList.add("active");
}

/* Individual Form Submit → Google Sheets */
async function submitForm() {
  const data = {
    name: document.getElementById("name").value,
    flat: document.getElementById("flat").value,
    sinking: document.getElementById("sinking").value,
    repairs: document.getElementById("repairs").value,
    tax: document.getElementById("tax").value,
    water: document.getElementById("water").value,
    electricity: document.getElementById("electricity").value,
    parking: document.getElementById("parking").value,
    insurance: document.getElementById("insurance").value,
    service: document.getElementById("service").value,
    interest: document.getElementById("interest").value,
    nonoccupancy: document.getElementById("nonoccupancy").value,
    training: document.getElementById("training").value
  };

  try {
    await fetch("https://script.google.com/macros/s/AKfycbxY51XhyShW7keWWbadHRfHQ8HiED8zg5IEBfYmFiEgn4KcNMXmBBb7PBFy_J-8xVApOw/exec", {
      method: "POST",
      body: JSON.stringify(data),
      headers: { "Content-Type": "application/json" }
    });

    alert("Data saved successfully ✅");
  } catch (err) {
    alert("Error saving data ❌");
  }
}

/* Bulk File Selection */
document.getElementById("fileInput").addEventListener("change", function() {
  const file = this.files[0];
  document.getElementById("fileName").innerText = file ? file.name : "No file selected";
});

/* Bulk Submit (placeholder for now) */
function submitFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file first");
    return;
  }

  alert("File ready for upload: " + file.name);
}
</script>

</body>
</html>
