<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Society Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  text-align: center;
}

/* Tabs */
.tabs {
  display: flex;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  background: #eee;
  cursor: pointer;
  border-radius: 8px;
  margin-right: 5px;
}

.tab.active {
  background: #4facfe;
  color: white;
}

/* Content */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #4facfe;
  color: white;
  border: none;
  border-radius: 6px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Society Management</h2>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="openTab(event,'individual')">Individual Entry</div>
  <div class="tab" onclick="openTab(event,'bulk')">Bulk Entry</div>
  <div class="tab" onclick="openTab(event,'expenses')">Expenses</div>
</div>

<!-- Individual Entry Tab -->
<div id="individual" class="tab-content active">
  <h3>Individual Entry</h3>

  <input placeholder="Name">
  <input placeholder="Flat No">

  <div class="row">
    <input type="number" placeholder="Sinking Fund">
    <input type="number" placeholder="Repairs & Maintenance">
    <input type="number" placeholder="Municipal Tax">
    <input type="number" placeholder="Water Charges">
    <input type="number" placeholder="Electricity Charges">
    <input type="number" placeholder="Parking Charges">
    <input type="number" placeholder="Insurance">
    <input type="number" placeholder="Service Charges">
    <input type="number" placeholder="Interest on Default">
    <input type="number" placeholder="Non-Occupancy Charges">
    <input type="number" placeholder="Training Fees">
  </div>

  <button>Submit</button>
</div>

<!-- Bulk Entry Tab -->
<div id="bulk" class="tab-content">
  <h3>Bulk Upload (Excel)</h3>

  <input type="file" accept=".xlsx,.xls,.csv">

  <button>Upload</button>

  <p>Upload Excel file with society data</p>
</div>

<!-- Expenses Tab -->
<div id="expenses" class="tab-content">
  <h3>Expenses</h3>

  <input placeholder="Expense Name">
  <input type="number" placeholder="Amount">
  <input type="date">

  <button>Add Expense</button>
</div>

</div>

<script>
function openTab(evt, tabName) {
  let tabs = document.getElementsByClassName("tab");
  let contents = document.getElementsByClassName("tab-content");

  for (let i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove("active");
    contents[i].classList.remove("active");
  }

  evt.target.classList.add("active");
  document.getElementById(tabName).classList.add("active");
}
</script>

</body>
</html>
