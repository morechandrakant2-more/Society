<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Society Charges Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    label {
      font-weight: 500;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #4facfe;
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #007bff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Society Charges Form</h2>

  <form>

    <label>Name</label>
    <input type="text" required>

    <label>Flat No</label>
    <input type="text" required>

    <div class="row">
      <div>
        <label>Sinking Fund</label>
        <input type="number">
      </div>

      <div>
        <label>Repairs & Maintenance</label>
        <input type="number">
      </div>

      <div>
        <label>Municipal Tax</label>
        <input type="number">
      </div>

      <div>
        <label>Water Charges</label>
        <input type="number">
      </div>

      <div>
        <label>Electricity Charges</label>
        <input type="number">
      </div>

      <div>
        <label>Parking Charges</label>
        <input type="number">
      </div>

      <div>
        <label>Insurance</label>
        <input type="number">
      </div>

      <div>
        <label>Service Charges</label>
        <input type="number">
      </div>

      <div>
        <label>Interest on Default</label>
        <input type="number">
      </div>

      <div>
        <label>Non-Occupancy Charges</label>
        <input type="number">
      </div>

      <div>
        <label>Training Fees</label>
        <input type="number">
      </div>
    </div>

    <button class="btn" type="submit">Submit</button>

  </form>
</div>

</body>
</html>
